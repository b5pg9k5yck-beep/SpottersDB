<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✈ Spotter DB</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--surface:#111827;--card:#161e2e;--border:#1e2d45;--accent:#00c2ff;--accent-dim:#005e7a;--accent-glow:rgba(0,194,255,0.15);--text:#e2eaf5;--muted:#5a7090;--warning:#f59e0b;--success:#10b981;--red:#ef4444;--tag:#1a2942}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:flex}
#screen-login{flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(0,194,255,0.08) 0%,transparent 70%),linear-gradient(180deg,#0d1929 0%,var(--bg) 100%);position:relative;overflow:hidden}
#screen-login::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,194,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,194,255,0.03) 1px,transparent 1px);background-size:40px 40px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;position:relative;z-index:1;box-shadow:0 0 60px rgba(0,194,255,0.1),0 20px 60px rgba(0,0,0,0.5)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px var(--accent))}
.login-logo h1{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);letter-spacing:0.15em;text-shadow:0 0 20px var(--accent)}
.login-logo p{color:var(--muted);font-size:11px;letter-spacing:0.1em;margin-top:6px;font-family:'Orbitron',sans-serif}
.field{margin-bottom:16px}
.field label{display:block;color:var(--muted);font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:0.12em;margin-bottom:6px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-size:15px;font-family:'JetBrains Mono',monospace;outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(0,194,255,0.1)}
.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;cursor:pointer;box-shadow:0 0 20px rgba(0,194,255,0.3);transition:opacity .2s}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-primary:active{opacity:.85}
.msg-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:var(--red);padding:10px 14px;font-size:13px;margin-top:12px;text-align:center;display:none}
.msg-info{color:var(--muted);font-size:11px;text-align:center;margin-top:16px;line-height:1.6}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#screen-app{flex-direction:column}
.app-wrap{max-width:600px;margin:0 auto;width:100%;padding-bottom:32px}
.app-header{background:linear-gradient(180deg,#0d1929 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-title h1{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;letter-spacing:0.1em;color:var(--accent);text-shadow:0 0 20px var(--accent)}
.header-title p{color:var(--muted);font-size:10px;margin-top:2px;letter-spacing:0.05em}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-add{background:var(--accent);border:none;border-radius:10px;color:#000;padding:9px 14px;cursor:pointer;font-family:'Orbitron',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.05em;box-shadow:0 0 16px var(--accent-glow)}
.btn-icon{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:9px 12px;cursor:pointer;font-size:14px;line-height:1}
.user-pill{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tabs{display:flex}
.tab-btn{flex:1;padding:10px 0;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:0.1em;cursor:pointer;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:10px;-webkit-appearance:none}
.filters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;cursor:pointer;-webkit-appearance:none}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-num{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900}
.stat-label{color:var(--muted);font-size:9px;letter-spacing:0.08em;margin-top:2px;font-family:'Orbitron',sans-serif}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;background:var(--tag);color:var(--accent);border:1px solid var(--accent-dim);cursor:pointer}
.clear-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer}
.record-list{display:grid;gap:8px}
.record-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.record-card.expanded{border-color:var(--accent)}.record-card.mine{border-left:3px solid var(--accent)}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.record-left{flex:1;min-width:0}
.reg-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.record-reg{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:15px}
.ops-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:var(--tag);color:var(--accent);border:1px solid var(--accent-dim);white-space:nowrap}
.my-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(0,194,255,0.1);color:var(--accent);border:1px solid var(--accent-dim);white-space:nowrap;font-family:'Orbitron',sans-serif;letter-spacing:0.05em}
.record-airline{color:var(--text);font-size:13px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-right{text-align:right;flex-shrink:0}
.record-spot{color:var(--warning);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px}
.record-date{color:var(--muted);font-size:11px;margin-top:2px}
.record-detail{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none}
.record-card.expanded .record-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-key{color:var(--muted);font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:0.1em}
.detail-val{color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;margin-top:2px}
.detail-actions{display:flex;gap:8px}
.btn-edit{flex:1;padding:8px;border-radius:8px;cursor:pointer;background:none;border:1px solid var(--accent-dim);color:var(--accent);font-size:12px;font-family:'Orbitron',sans-serif}
.btn-delete{padding:8px 14px;border-radius:8px;cursor:pointer;background:none;border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:13px}
.pagination{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:16px}
.page-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:16px}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
.page-info{color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace}
.empty-state{text-align:center;color:var(--muted);padding:48px 0;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:0.1em}
.stats-section{margin-bottom:24px}
.stats-section h3{font-family:'Orbitron',sans-serif;color:var(--accent);font-size:12px;margin-bottom:12px;letter-spacing:0.1em}
.bar-row{margin-bottom:10px}.bar-meta{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%}
.bar-count{font-family:'JetBrains Mono',monospace;font-size:13px}
.bar-track{background:var(--border);border-radius:4px;height:4px}.bar-fill{height:100%;border-radius:4px}
.country-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.country-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.country-name{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72%}
.country-count{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:12px;font-weight:700}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-overlay.open{display:flex}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 0 40px var(--accent-glow);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:15px}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px}
.modal-fields{display:grid;gap:12px}
.modal-field label{display:block;color:var(--muted);font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:0.1em;margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;-webkit-appearance:none}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.btn-cancel{flex:1;padding:11px;border-radius:8px;cursor:pointer;background:none;border:1px solid var(--border);color:var(--muted);font-size:13px}
.btn-save{flex:2;padding:11px;border-radius:8px;cursor:pointer;background:var(--accent);border:none;color:#000;font-size:13px;font-weight:700;font-family:'Orbitron',sans-serif;letter-spacing:0.05em}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:transform .3s ease;z-index:2000;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.success{border-color:var(--success);color:var(--success)}.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">✈</span>
      <h1>SPOTTER DB</h1>
      <p>CIVIL AIRLINER DATABASE</p>
    </div>
    <div class="field">
      <label for="login-email">EMAIL</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email" autocapitalize="none"/>
    </div>
    <div class="field">
      <label for="login-pass">PASSWORD</label>
      <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">SIGN IN</button>
    <div class="msg-error" id="login-error"></div>
    <div class="msg-info">🔐 Authorised users only<br>Contact the administrator for access</div>
  </div>
</div>

<div id="screen-app" class="screen">
  <div class="app-wrap">
    <div class="app-header">
      <div class="header-top">
        <div class="header-title">
          <h1>✈ SPOTTER DB</h1>
          <p>CIVIL AIRLINER DATABASE</p>
        </div>
        <div class="header-actions">
          <span class="user-pill" id="user-pill"></span>
          <button class="btn-add" onclick="openModal()">+ LOG</button>
          <button class="btn-icon" onclick="doLogout()" title="Sign out">⏻</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('list',this)">LIST</button>
        <button class="tab-btn" onclick="switchTab('stats',this)">STATS</button>
      </div>
    </div>
    <div class="content" id="tab-list">
      <input class="search-input" type="search" id="search-box" placeholder="Search registration, airline, type..." oninput="applyFilters()"/>
      <div class="filters">
        <select class="filter-select" id="filter-country" onchange="applyFilters()"><option value="">Country</option></select>
        <select class="filter-select" id="filter-spot" onchange="applyFilters()"><option value="">Airport</option></select>
        <select class="filter-select" id="sort-by" onchange="onSort()">
          <option value="reg">Reg A→Z</option>
          <option value="regdesc">Reg Z→A</option>
          <option value="date">Date ↓</option>
          <option value="airline">Airline</option>
        </select>
      </div>
      <div class="stats-bar" id="stats-bar"></div>
      <div class="active-filters" id="active-filters" style="display:none"></div>
      <div class="record-list" id="record-list"><div style="text-align:center;color:var(--muted);padding:48px 0;font-size:13px">⟳ Loading...</div></div>
      <div class="pagination" id="pagination"></div>
    </div>
    <div class="content" id="tab-stats" style="display:none"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">✈️ LOG NEW SIGHTING</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-fields">
      <input type="hidden" id="edit-id"/>
      <div class="modal-field"><label>REGISTRATION *</label><input type="text" id="f-reg" placeholder="e.g. G-BOAC"/></div>
      <div class="modal-field"><label>AIRLINE</label><input type="text" id="f-airline" placeholder="e.g. British Airways"/></div>
      <div class="modal-field"><label>AIRCRAFT TYPE</label><input type="text" id="f-type" placeholder="e.g. 747-436"/></div>
      <div class="modal-field"><label>ICAO CODE (OPS)</label><input type="text" id="f-ops" placeholder="e.g. BAW"/></div>
      <div class="modal-field"><label>AIRPORT / SPOT</label><input type="text" id="f-spot" placeholder="e.g. LHR"/></div>
      <div class="modal-field"><label>DATE SPOTTED</label><input type="date" id="f-date"/></div>
      <div class="modal-field"><label>COUNTRY</label><select id="f-country"></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveRecord()">SAVE SIGHTING</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>

let db=[], filtered=[], currentUser=null, page=0, sortBy=‘reg’, expandedId=null;

function toast(msg, type=‘success’) {
const el = document.getElementById(‘toast’);
el.textContent = msg;
el.className = ’toast ’ + type;
void el.offsetWidth;
el.classList.add(‘show’);
setTimeout(() => el.classList.remove(‘show’), 2800);
}

async function doLogin() {
const email = document.getElementById(‘login-email’).value.trim();
const pass  = document.getElementById(‘login-pass’).value;
const btn   = document.getElementById(‘login-btn’);
const err   = document.getElementById(‘login-error’);
err.style.display = ‘none’;
if (!email || !pass) { err.textContent=‘Please enter email and password’; err.style.display=‘block’; return; }
btn.disabled = true;
btn.innerHTML = ‘<span class="spinner"></span>SIGNING IN…’;
const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
if (error) {
err.textContent = error.message;
err.style.display = ‘block’;
btn.disabled = false;
btn.textContent = ‘SIGN IN’;
} else {
currentUser = data.user;
await initApp();
}
}

async function doLogout() {
await sb.auth.signOut();
currentUser = null; db = []; filtered = [];
document.getElementById(‘screen-app’).classList.remove(‘active’);
document.getElementById(‘screen-login’).classList.add(‘active’);
document.getElementById(‘login-pass’).value = ‘’;
document.getElementById(‘login-btn’).disabled = false;
document.getElementById(‘login-btn’).textContent = ‘SIGN IN’;
}

document.getElementById(‘login-pass’).addEventListener(‘keydown’, e => { if(e.key===‘Enter’) doLogin(); });
document.getElementById(‘login-email’).addEventListener(‘keydown’, e => { if(e.key===‘Enter’) doLogin(); });

async function initApp() {
document.getElementById(‘screen-login’).classList.remove(‘active’);
document.getElementById(‘screen-app’).classList.add(‘active’);
document.getElementById(‘user-pill’).textContent = currentUser.email.split(’@’)[0].toUpperCase();

const { data: rows } = await sb.from(‘sightings’).select(’*’).order(‘registration’, { ascending: true });

const userRows = (rows || []).map(r => ({
id: r.id, airline: r.airline||’’, registration: r.registration||’’,
type: r.type||’’, ops: r.ops||’’, spot: r.spot||’’,
date: r.date||’’, country: r.country||’’,
_mine: r.user_id === currentUser.id, _cloud: true,
}));

const cloudRegs = new Set(userRows.map(r => r.registration));
const baseRows = BASE_DATA
.filter(r => !cloudRegs.has(r.registration))
.map((r,i) => ({ …r, id: ‘base_’+i, _mine: false, _cloud: false }));

db = […baseRows, …userRows];
populateFilters();
applyFilters();
}

function populateFilters() {
const countries = […new Set(db.map(r=>r.country).filter(Boolean))].sort();
const spots     = […new Set(db.map(r=>r.spot).filter(Boolean))].sort();
document.getElementById(‘filter-country’).innerHTML =
‘<option value="">Country</option>’ + countries.map(c=>`<option value="${c}">${c}</option>`).join(’’);
document.getElementById(‘filter-spot’).innerHTML =
‘<option value="">Airport</option>’ + spots.map(s=>`<option value="${s}">${s}</option>`).join(’’);
document.getElementById(‘f-country’).innerHTML =
‘<option value="">Select country…</option>’ + countries.map(c=>`<option value="${c}">${c}</option>`).join(’’);
}

function applyFilters() {
const q       = document.getElementById(‘search-box’).value.toLowerCase().trim();
const country = document.getElementById(‘filter-country’).value;
const spot    = document.getElementById(‘filter-spot’).value;
filtered = db.filter(r => {
if (q && !Object.values(r).some(v => String(v||’’).toLowerCase().includes(q))) return false;
if (country && r.country !== country) return false;
if (spot && r.spot !== spot) return false;
return true;
});
filtered.sort((a,b) => {
if (sortBy===‘reg’)     return (a.registration||’’).localeCompare(b.registration||’’);
if (sortBy===‘regdesc’) return (b.registration||’’).localeCompare(a.registration||’’);
if (sortBy===‘date’)    return (b.date||’’).localeCompare(a.date||’’);
if (sortBy===‘airline’) return (a.airline||’’).localeCompare(b.airline||’’);
return 0;
});
page = 0;
renderStatsBar(q, country, spot);
renderList();
}

function onSort() { sortBy = document.getElementById(‘sort-by’).value; applyFilters(); }

function renderStatsBar(q, country, spot) {
const airlines = new Set(filtered.map(r=>r.airline).filter(Boolean)).size;
const spots2   = new Set(filtered.map(r=>r.spot).filter(Boolean)).size;
document.getElementById(‘stats-bar’).innerHTML = ` <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${filtered.length}</div><div class="stat-label">SIGHTINGS</div></div> <div class="stat-card"><div class="stat-num" style="color:var(--warning)">${airlines}</div><div class="stat-label">AIRLINES</div></div> <div class="stat-card"><div class="stat-num" style="color:var(--success)">${spots2}</div><div class="stat-label">AIRPORTS</div></div>`;
const af = document.getElementById(‘active-filters’);
if (!q && !country && !spot) { af.style.display=‘none’; return; }
af.style.display = ‘flex’;
let h = ‘’;
if (country) h += `<span class="filter-tag" onclick="clearFilter('country')">${country} ✕</span>`;
if (spot)    h += `<span class="filter-tag" onclick="clearFilter('spot')">${spot} ✕</span>`;
if (q)       h += `<span class="filter-tag" onclick="clearFilter('search')">"${q}" ✕</span>`;
h += `<button class="clear-btn" onclick="clearAll()">Clear all</button>`;
af.innerHTML = h;
}

function clearFilter(t) {
if(t===‘country’) document.getElementById(‘filter-country’).value=’’;
if(t===‘spot’)    document.getElementById(‘filter-spot’).value=’’;
if(t===‘search’)  document.getElementById(‘search-box’).value=’’;
applyFilters();
}
function clearAll() {
[‘filter-country’,‘filter-spot’,‘search-box’].forEach(id => document.getElementById(id).value=’’);
applyFilters();
}

function fmt(v) { return v || ‘—’; }

function renderList() {
const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
const slice = filtered.slice(page*PAGE_SIZE, (page+1)*PAGE_SIZE);
const list  = document.getElementById(‘record-list’);
if (!slice.length) {
list.innerHTML = ‘<div class="empty-state">NO SIGHTINGS FOUND</div>’;
document.getElementById(‘pagination’).innerHTML = ‘’;
return;
}
list.innerHTML = slice.map(rec => {
const exp     = rec.id === expandedId;
const canEdit = rec._cloud && rec._mine;
return `<div class="record-card${exp?' expanded':''}${rec._mine?' mine':''}" onclick="toggleCard('${rec.id}')"> <div class="record-top"> <div class="record-left"> <div class="reg-row"> <span class="record-reg">${rec.registration}</span> ${rec.ops ? `<span class="ops-badge">${rec.ops}</span>`: ''} ${rec._mine ? '<span class="my-badge">MY LOG</span>' : ''} </div> <div class="record-airline">${fmt(rec.airline)}</div> </div> <div class="record-right"> <div class="record-spot">${fmt(rec.spot)}</div> <div class="record-date">${fmt(rec.date)}</div> </div> </div> <div class="record-detail"> <div class="detail-grid"> <div><div class="detail-key">TYPE</div><div class="detail-val">${fmt(rec.type)}</div></div> <div><div class="detail-key">COUNTRY</div><div class="detail-val">${fmt(rec.country)}</div></div> </div> ${canEdit ?`<div class="detail-actions">
<button class="btn-edit" onclick="editRecord(event,'${rec.id}')">EDIT</button>
<button class="btn-delete" onclick="deleteRecord(event,'${rec.id}')">🗑</button>
</div>` : ''} </div> </div>`;
}).join(’’);
document.getElementById(‘pagination’).innerHTML = totalPages<=1 ? ‘’ : ` <button class="page-btn" onclick="changePage(-1)"${page===0?' disabled':''}>‹</button> <span class="page-info">${page+1} / ${totalPages}</span> <button class="page-btn" onclick="changePage(1)"${page>=totalPages-1?' disabled':''}>›</button>`;
}

function toggleCard(id) { expandedId = expandedId===id ? null : id; renderList(); }
function changePage(dir) { page+=dir; expandedId=null; renderList(); window.scrollTo(0,0); }

function openModal(rec) {
document.getElementById(‘edit-id’).value   = rec ? rec.id : ‘’;
document.getElementById(‘modal-title’).textContent = rec ? ‘✏️ EDIT SIGHTING’ : ‘✈️ LOG NEW SIGHTING’;
document.getElementById(‘f-reg’).value     = rec ? rec.registration : ‘’;
document.getElementById(‘f-airline’).value = rec ? rec.airline : ‘’;
document.getElementById(‘f-type’).value    = rec ? rec.type : ‘’;
document.getElementById(‘f-ops’).value     = rec ? rec.ops : ‘’;
document.getElementById(‘f-spot’).value    = rec ? rec.spot : ‘’;
document.getElementById(‘f-date’).value    = rec ? rec.date : ‘’;
document.getElementById(‘f-country’).value = rec ? rec.country : ‘’;
document.getElementById(‘modal’).classList.add(‘open’);
}
function closeModal() { document.getElementById(‘modal’).classList.remove(‘open’); }

async function saveRecord() {
const reg = document.getElementById(‘f-reg’).value.trim();
if (!reg) { alert(‘Registration is required’); return; }
const editId = document.getElementById(‘edit-id’).value;
const payload = {
user_id:      currentUser.id,
registration: reg,
airline:      document.getElementById(‘f-airline’).value.trim(),
type:         document.getElementById(‘f-type’).value.trim(),
ops:          document.getElementById(‘f-ops’).value.trim().toUpperCase(),
spot:         document.getElementById(‘f-spot’).value.trim().toUpperCase(),
date:         document.getElementById(‘f-date’).value,
country:      document.getElementById(‘f-country’).value,
};
let error;
if (editId && !editId.startsWith(‘base_’)) {
({ error } = await sb.from(‘sightings’).update(payload).eq(‘id’, editId));
} else {
({ error } = await sb.from(‘sightings’).insert(payload));
}
if (error) { toast(’Save failed: ’ + error.message, ‘error’); return; }
toast(editId ? ‘✅ Sighting updated’ : ‘✅ Sighting logged’);
closeModal();
await initApp();
}

function editRecord(e, id) { e.stopPropagation(); const rec=db.find(r=>r.id===id); if(rec) openModal(rec); }

async function deleteRecord(e, id) {
e.stopPropagation();
if (!confirm(‘Delete this sighting?’)) return;
const { error } = await sb.from(‘sightings’).delete().eq(‘id’, id);
if (error) { toast(‘Delete failed’, ‘error’); return; }
toast(‘🗑 Sighting deleted’);
await initApp();
}

function switchTab(tab, btn) {
document.querySelectorAll(’.tab-btn’).forEach(b=>b.classList.remove(‘active’));
btn.classList.add(‘active’);
document.getElementById(‘tab-list’).style.display  = tab===‘list’  ? ‘block’ : ‘none’;
document.getElementById(‘tab-stats’).style.display = tab===‘stats’ ? ‘block’ : ‘none’;
if (tab===‘stats’) renderStats();
}

function renderStats() {
const airlines={}, spotsMap={}, countriesMap={};
db.forEach(r => {
if(r.airline) airlines[r.airline]=(airlines[r.airline]||0)+1;
if(r.spot)    spotsMap[r.spot]=(spotsMap[r.spot]||0)+1;
if(r.country) countriesMap[r.country]=(countriesMap[r.country]||0)+1;
});
const topA = Object.entries(airlines).sort((a,b)=>b[1]-a[1]).slice(0,10);
const topS = Object.entries(spotsMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
const topC = Object.entries(countriesMap).sort((a,b)=>b[1]-a[1]).slice(0,20);
const tA = new Set(db.map(r=>r.airline).filter(Boolean)).size;
const tS = new Set(db.map(r=>r.spot).filter(Boolean)).size;
const myCount = db.filter(r=>r._mine).length;
document.getElementById(‘tab-stats’).innerHTML = ` <div class="stats-bar" style="margin-bottom:20px"> <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${db.length}</div><div class="stat-label">SIGHTINGS</div></div> <div class="stat-card"><div class="stat-num" style="color:var(--warning)">${tA}</div><div class="stat-label">AIRLINES</div></div> <div class="stat-card"><div class="stat-num" style="color:var(--success)">${tS}</div><div class="stat-label">AIRPORTS</div></div> </div> <div class="stat-card" style="margin-bottom:20px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center"> <span style="font-family:'Orbitron',sans-serif;font-size:11px;color:var(--muted);letter-spacing:0.1em">MY LOGGED SIGHTINGS</span> <span style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--accent)">${myCount}</span> </div> <div class="stats-section"><h3>TOP AIRLINES</h3> ${topA.map(([n,c])=>`<div class="bar-row"><div class="bar-meta"><span class="bar-name">${n}</span><span class="bar-count" style="color:var(--warning)">${c}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(c/topA[0][1]*100).toFixed(1)}%;background:linear-gradient(90deg,var(--warning),var(--accent))"></div></div></div>`).join('')} </div> <div class="stats-section"><h3>TOP SPOTTING LOCATIONS</h3> ${topS.map(([s,c])=>`<div class="bar-row"><div class="bar-meta"><span class="bar-name" style="font-family:'JetBrains Mono',monospace;font-weight:700">${s}</span><span class="bar-count" style="color:var(--success)">${c}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(c/topS[0][1]*100).toFixed(1)}%;background:linear-gradient(90deg,var(--success),var(--accent))"></div></div></div>`).join('')} </div> <div class="stats-section"><h3>BY COUNTRY</h3> <div class="country-grid">${topC.map(([c,n])=>`<div class="country-item"><span class="country-name">${c}</span><span class="country-count">${n}</span></div>`).join('')}</div> </div>`;
}

window.addEventListener(‘load’, async () => {
const { data: { session } } = await sb.auth.getSession();
if (session) { currentUser = session.user; await initApp(); }
});

</script>
</body>
</html>
